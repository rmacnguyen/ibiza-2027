<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ibiza July 2–5 Event Voter</title>
  <style>
    :root {
      --bg: #0e1020;
      --panel: #171a2f;
      --panel-2: #20243d;
      --text: #f7f7fb;
      --muted: #a9afc8;
      --border: #303651;
      --accent: #78ffd6;
      --accent-2: #ff7ad9;
      --danger: #ffb4b4;
      --shadow: 0 14px 40px rgba(0,0,0,.32);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 0%, #28305c 0%, var(--bg) 38%, #070812 100%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(14,16,32,.86);
      border-bottom: 1px solid var(--border);
    }
    .wrap { max-width: 1800px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 6px; font-size: clamp(24px, 3vw, 42px); letter-spacing: -.04em; }
    .subtitle { margin: 0; color: var(--muted); font-size: 14px; }
    .controls {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .top-controls {
      display: grid;
      grid-template-columns: minmax(180px, 280px) auto auto 1fr;
      gap: 12px;
      align-items: end;
    }
    .filter-controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 360px) minmax(220px, 300px);
      gap: 12px;
      align-items: end;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], select, .dropdown-button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 12px 13px;
      font-size: 14px;
      outline: none;
    }
    input[type="text"]:focus, select:focus, .dropdown-button:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(120,255,214,.14); }
    .clear-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .clear-btn:hover { border-color: var(--accent); }
    details.dropdown { position: relative; }
    details.dropdown summary { list-style: none; cursor: pointer; }
    details.dropdown summary::-webkit-details-marker { display: none; }
    .dropdown-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(360px, 92vw);
      max-height: 380px;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #14172b;
      box-shadow: var(--shadow);
      z-index: 40;
    }
    .venue-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .venue-option:hover { background: rgba(255,255,255,.07); }
    .venue-actions { display: flex; gap: 8px; padding: 8px 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .mini-btn { border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 999px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
    main.wrap { padding-top: 18px; }
    .stats { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    .columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: 14px;
      align-items: start;
    }
    .day {
      background: rgba(255,255,255,.045);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px;
      min-height: 70vh;
    }
    .day h2 {
      position: sticky;
      top: 130px;
      z-index: 5;
      margin: -12px -12px 12px;
      padding: 14px 12px 12px;
      background: linear-gradient(rgba(23,26,47,.98), rgba(23,26,47,.92));
      border-bottom: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
      font-size: 17px;
      text-transform: capitalize;
    }
    .event {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(23,26,47,.88);
      color: var(--text);
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease;
      position: relative;
      overflow: hidden;
    }
    .event:hover { transform: translateY(-1px); border-color: rgba(120,255,214,.6); }
    .event.has-votes {
      border-color: hsla(var(--heat-hue, 46), 100%, 58%, calc(.36 + var(--vote-heat, 0) * .48));
      background:
        linear-gradient(135deg,
          hsla(var(--heat-hue, 46), 100%, 55%, calc(.045 + var(--vote-heat, 0) * .13)),
          rgba(23,26,47,.88) 54%);
      box-shadow:
        0 0 0 1px hsla(var(--heat-hue, 46), 100%, 61%, calc(.08 + var(--vote-heat, 0) * .24)),
        0 8px calc(14px + var(--vote-heat, 0) * 18px) hsla(var(--heat-hue, 46), 100%, 52%, calc(.04 + var(--vote-heat, 0) * .16));
    }
    .event > * {
      position: relative;
      z-index: 1;
    }
    .event.has-votes::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      border-radius: 18px 0 0 18px;
      background: hsl(var(--heat-hue, 46), 100%, calc(58% + var(--vote-heat, 0) * 6%));
      box-shadow: 0 0 calc(7px + var(--vote-heat, 0) * 15px) hsla(var(--heat-hue, 46), 100%, 55%, calc(.28 + var(--vote-heat, 0) * .26));
      z-index: 0;
      pointer-events: none;
    }
    .event.voted { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(120,255,214,.38), 0 10px 28px rgba(120,255,214,.10); }
    .event-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; min-height: 18px; }
    .event-title { font-weight: 800; line-height: 1.1; font-size: 14px; padding-right: 4px; }
    .fire-tier { flex: 0 0 auto; min-width: 72px; text-align: right; line-height: 1; letter-spacing: -4px; font-size: 28px; transform: translateY(-4px); filter: drop-shadow(0 0 12px rgba(255, 126, 40, .58)); }
    .event-bottom { display: flex; justify-content: flex-end; align-items: end; gap: 10px; margin-top: 8px; }
    .badge { flex: 0 0 auto; min-width: 28px; padding: 5px 8px; border-radius: 999px; background: var(--panel-2); color: var(--accent); font-weight: 800; font-size: 12px; text-align: center; border: 1px solid rgba(120,255,214,.22); }
    .event.has-votes .badge {
      background: hsla(var(--heat-hue, 46), 100%, calc(48% + var(--vote-heat, 0) * 8%), calc(.22 + var(--vote-heat, 0) * .44));
      color: #fffaf0;
      border-color: hsla(var(--heat-hue, 46), 100%, 70%, calc(.42 + var(--vote-heat, 0) * .38));
      box-shadow: 0 0 calc(8px + var(--vote-heat, 0) * 15px) hsla(var(--heat-hue, 46), 100%, 52%, calc(.10 + var(--vote-heat, 0) * .25));
    }
    .meta { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .artists { margin-top: 8px; font-size: 12px; line-height: 1.35; color: #d8dcf0; }
    .my-check { margin-right: 5px; filter: drop-shadow(0 0 6px rgba(120,255,214,.35)); }
    .filter-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 14px;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      font-size: 14px;
    }
    .filter-toggle:hover { border-color: var(--accent); }
    .filter-toggle input { accent-color: var(--accent); }
    .filter-toggle.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(120,255,214,.12); }
    .empty { color: var(--muted); border: 1px dashed var(--border); border-radius: 16px; padding: 18px; text-align: center; }
    .warning { color: var(--danger); font-size: 12px; margin-top: 7px; display: none; }
    .vote-cutoff {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 14px;
      color: var(--text);
      font-size: 13px;
      user-select: none;
    }
    .vote-cutoff-controls { display: flex; align-items: center; gap: 8px; }
    .vote-cutoff button {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .vote-cutoff button:hover { border-color: var(--accent); }
    #voteCutoffValue {
      min-width: 24px;
      text-align: center;
      font-weight: 900;
      color: var(--accent);
    }
    @media (max-width: 1180px) {
      .top-controls { grid-template-columns: minmax(180px, 280px) auto; }
      .filter-controls { grid-template-columns: 1fr 1fr; }
      .columns { grid-template-columns: repeat(2, minmax(280px, 1fr)); }
      .day h2 { top: 236px; }
    }
    @media (max-width: 700px) {
      .top-controls, .filter-controls, .columns { grid-template-columns: 1fr; }
      header { position: static; }
      .day h2 { position: static; }
    }
  
    .sync-status { margin-top: 10px; font-size: 12px; color: var(--muted); }
    .setup-box {
      margin: 14px 0;
      padding: 12px;
      border: 1px solid rgba(255,180,180,.45);
      background: rgba(255,180,180,.08);
      color: var(--danger);
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.45;
    }
    .event[disabled] { opacity: .72; cursor: wait; }
</style>

          </div>
          <div>
            <label>Vote count filter</label>

              <span>Votes ≥</span>
              <div class="vote-cutoff-controls">
                <button id="decrementVoteCutoff" type="button" aria-label="Decrease vote cutoff">‹</button>
                <span id="voteCutoffValue">0</span>
                <button id="incrementVoteCutoff" type="button" aria-label="Increase vote cutoff">›</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="syncStatus" class="sync-status"></div>
    </div>
  </header>

  <main class="wrap">
    <div id="stats" class="stats"></div>
    <section class="columns" id="columns"></section>
  </main>

const DAYS = ['thursday july 2', 'friday july 3', 'saturday july 4', 'sunday july 5'];

/*
  Paste your deployed Google Apps Script Web App URL here.
  It should look like:
  https://script.google.com/macros/s/AKfycb.../exec
*/
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzTJzODYoFo5fIKgdRV2ACU7IgmhXkCym-FXSawNA56p3VvqxGPVZHwEGflcjg2vGB7gw/exec';

const NAME_KEY = 'ibiza-event-voter-name-v2';

let selectedVenues = new Set(EVENTS.map(e => e.venue));
let votesByName = {};
let isLoadingVotes = false;
let isSavingVotes = false;
let pendingSaveTimer = null;
let voteCutoff = 0;
let showMyVotesOnly = false;

const nameInput = document.getElementById('nameInput');
const artistSearch = document.getElementById('artistSearch');
const showMyVotes = document.getElementById('showMyVotes');
const showMyVotesLabel = document.getElementById('showMyVotesLabel');
const voteCutoffValue = document.getElementById('voteCutoffValue');
const decrementVoteCutoff = document.getElementById('decrementVoteCutoff');
const incrementVoteCutoff = document.getElementById('incrementVoteCutoff');
const columns = document.getElementById('columns');
const stats = document.getElementById('stats');
const venueOptions = document.getElementById('venueOptions');
const venueSummary = document.getElementById('venueSummary');
const nameWarning = document.getElementById('nameWarning');
const syncStatus = document.getElementById('syncStatus');
const setupWarning = document.getElementById('setupWarning');

function normalizedName() {
  return nameInput.value.trim().replace(/\s+/g, ' ');
}

function isConfigured() {
  return APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE');
}

function setStatus(message, isError = false) {
  syncStatus.textContent = message;
  syncStatus.style.color = isError ? 'var(--danger)' : 'var(--muted)';
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    if (!isConfigured()) {
      reject(new Error('Apps Script URL is not configured yet.'));
      return;
    }

    const callbackName = 'ibizaVotesCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_', Date.now().toString());

    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timed out contacting Google Apps Script.'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      script.remove();
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
    }

    window[callbackName] = (data) => {
      cleanup();
      if (data && data.ok === false) reject(new Error(data.error || 'Apps Script returned an error.'));
      else resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('Could not load Google Apps Script response.'));
    };

    script.src = url.toString();
    document.body.appendChild(script);
  });
}

function votesByEvent() {
  const result = {};
  Object.entries(votesByName).forEach(([name, eventIds]) => {
    if (!Array.isArray(eventIds)) return;
    eventIds.forEach(eventId => {
      if (!result[eventId]) result[eventId] = [];
      result[eventId].push(name);
    });
  });
  Object.values(result).forEach(names => names.sort((a,b) => a.localeCompare(b)));
  return result;
}

function votersFor(eventId) {
  return votesByEvent()[eventId] || [];
}

function maxVoteCount() {
  const byEvent = votesByEvent();
  return Math.max(1, ...Object.values(byEvent).map(names => names.length));
}

function isVotedByMe(eventId) {
  const name = normalizedName();
  return !!name && Array.isArray(votesByName[name]) && votesByName[name].includes(eventId);
}

function minutes(t) {
  if (!t) return 99999;
  const [h,m] = t.split(':').map(Number);
  return h * 60 + m;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(str) { return escapeHtml(str); }

function renderVenues() {
  const venues = [...new Set(EVENTS.map(e => e.venue))].sort((a,b) => a.localeCompare(b));
  venueOptions.innerHTML = venues.map(v => `
    <label class="venue-option">
      <input type="checkbox" value="${escapeAttr(v)}" ${selectedVenues.has(v) ? 'checked' : ''}>
      <span>${escapeHtml(v)}</span>
    </label>
  `).join('');

  const selectedCount = selectedVenues.size;
  venueSummary.textContent = selectedCount === venues.length ? 'All venues' : selectedCount === 0 ? 'No venues' : `${selectedCount} venue${selectedCount === 1 ? '' : 's'} selected`;

  venueOptions.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) selectedVenues.add(cb.value);
      else selectedVenues.delete(cb.value);
      renderVenues();
      render();
    });
  });
}

function matchesFilters(ev) {
  const q = artistSearch.value.trim().toLowerCase();
  const text = [ev.title, ev.venue, ...(ev.artists || [])].join(' ').toLowerCase();
  const voteCount = votersFor(ev.id).length;
  return selectedVenues.has(ev.venue)
    && (!q || text.includes(q))
    && voteCount >= voteCutoff
    && (!showMyVotesOnly || isVotedByMe(ev.id));
}

function render() {
  setupWarning.style.display = isConfigured() ? 'none' : 'block';

  const filtered = EVENTS.filter(matchesFilters).sort((a,b) =>
    DAYS.indexOf(a.day) - DAYS.indexOf(b.day) ||
    minutes(a.start) - minutes(b.start) ||
    minutes(a.end) - minutes(b.end) ||
    a.venue.localeCompare(b.venue)
  );

  const peopleCount = Object.keys(votesByName).filter(name => Array.isArray(votesByName[name]) && votesByName[name].length).length;
  const votedEventCount = Object.keys(votesByEvent()).length;
  voteCutoffValue.textContent = voteCutoff;
  const cutoffText = voteCutoff > 0 ? ` • showing events with ≥ ${voteCutoff} vote${voteCutoff === 1 ? '' : 's'}` : '';
  const mineText = showMyVotesOnly ? ' • showing my votes only' : '';
  stats.textContent = `${filtered.length} of ${EVENTS.length} events shown • ${votedEventCount} events have votes • ${peopleCount} people have voted${cutoffText}${mineText}`;
  columns.innerHTML = DAYS.map(day => {
    const items = filtered.filter(e => e.day === day);
    return `<article class="day"><h2>${escapeHtml(day)}</h2>${items.length ? items.map(renderEvent).join('') : '<div class="empty">No events match your filters.</div>'}</article>`;
  }).join('');

  columns.querySelectorAll('.event').forEach(btn => {
    btn.addEventListener('click', async () => {
      const name = normalizedName();
      if (!name) {
        nameWarning.style.display = 'block';
        nameInput.focus();
        return;
      }
      if (!isConfigured()) {
        setStatus('Paste your Google Apps Script URL into APPS_SCRIPT_URL first.', true);
        return;
      }

      const eventId = btn.dataset.eventId;
      const mine = new Set(votesByName[name] || []);
      if (mine.has(eventId)) mine.delete(eventId);
      else mine.add(eventId);

      votesByName[name] = [...mine].sort();
      localStorage.setItem(NAME_KEY, name);
      render();
      scheduleSave(name);
    });
  });
}

function renderEvent(ev) {
  const voters = votersFor(ev.id);
  const voteCount = voters.length;
  const title = voteCount ? `Voted by: ${voters.join(', ')}` : 'No votes yet';
  const voted = isVotedByMe(ev.id);
  const disabled = isSavingVotes ? 'disabled' : '';
  // Heat scale is fixed to the 11-person group: 1 vote = faint yellow, 11 votes = bright red.
  const heat = voteCount ? Math.max(0.08, Math.min(1, voteCount / 11)) : 0;
  // Hue scale: 48 = soft yellow, 2 = bright red. More votes => hotter.
  const heatHue = voteCount ? Math.round(48 - heat * 46) : 48;
  const fire = voteCount >= 9 ? '🔥🔥🔥' : voteCount >= 6 ? '🔥🔥' : voteCount >= 3 ? '🔥' : '';
  const classes = ['event', voteCount ? 'has-votes' : '', voted ? 'voted' : ''].filter(Boolean).join(' ');
  return `
    <button class="${classes}" style="--vote-heat:${heat.toFixed(2)}; --heat-hue:${heatHue}" data-event-id="${escapeAttr(ev.id)}" title="${escapeAttr(title)}" ${disabled}>
      <div class="event-top"><div class="event-title">${escapeHtml(ev.title)}</div><div class="fire-tier" aria-label="${voteCount} votes">${fire}</div></div>
      <div class="meta">${escapeHtml(ev.start)}${ev.end ? '–' + escapeHtml(ev.end) : ''} • ${escapeHtml(ev.venue)}</div>
      <div class="artists">${escapeHtml((ev.artists || []).join(', ') || 'Line-up not listed')}</div>
      <div class="event-bottom"><div class="badge">${voted ? '<span class="my-check">✅</span>' : ''}${voteCount}</div></div>
    </button>
  `;
}

async function loadVotes() {
  if (!isConfigured()) {
    setStatus('Google Sheets backend not configured yet.');
    render();
    return;
  }

  isLoadingVotes = true;
  setStatus('Loading shared votes...');
  try {
    const data = await jsonp({ action: 'list' });
    votesByName = data.votesByName || {};
    setStatus('Shared votes loaded.');
  } catch (err) {
    console.error(err);
    setStatus(err.message || 'Could not load shared votes.', true);
  } finally {
    isLoadingVotes = false;
    render();
  }
}

function scheduleSave(name) {
  clearTimeout(pendingSaveTimer);
  pendingSaveTimer = setTimeout(() => saveMyVotes(name), 250);
}

async function saveMyVotes(name) {
  if (!isConfigured()) return;
  isSavingVotes = true;
  setStatus('Saving your votes...');
  render();

  try {
    const eventIds = (votesByName[name] || []).join(',');
    const data = await jsonp({
      action: 'setUserVotes',
      name,
      votes: eventIds
    });
    votesByName = data.votesByName || votesByName;
    setStatus('Saved to Google Sheet.');
  } catch (err) {
    console.error(err);
    setStatus(err.message || 'Could not save votes.', true);
  } finally {
    isSavingVotes = false;
    render();
  }
}

const savedName = localStorage.getItem(NAME_KEY) || '';
if ([...nameInput.options].some(option => option.value === savedName)) {
  nameInput.value = savedName;
} else {
  nameInput.value = '';
  localStorage.removeItem(NAME_KEY);
}
nameInput.addEventListener('change', () => {
  localStorage.setItem(NAME_KEY, normalizedName());
  nameWarning.style.display = 'none';
  render();
});

artistSearch.addEventListener('input', render);

showMyVotes.addEventListener('change', () => {
  showMyVotesOnly = showMyVotes.checked;
  showMyVotesLabel.classList.toggle('active', showMyVotesOnly);
  if (showMyVotesOnly && !normalizedName()) {
    nameWarning.style.display = 'block';
    nameInput.focus();
  }
  render();
});


decrementVoteCutoff.addEventListener('click', () => {
  voteCutoff = Math.max(0, voteCutoff - 1);
  render();
});

incrementVoteCutoff.addEventListener('click', () => {
  voteCutoff = Math.min(maxVoteCount(), voteCutoff + 1);
  render();
});

document.getElementById('clearMyVotes').addEventListener('click', () => {
  const name = normalizedName();
  if (!name) {
    nameWarning.style.display = 'block';
    nameInput.focus();
    return;
  }
  votesByName[name] = [];
  render();
  scheduleSave(name);
});

document.getElementById('allVenues').addEventListener('click', () => {
  selectedVenues = new Set(EVENTS.map(e => e.venue));
  renderVenues();
  render();
});

document.getElementById('noVenues').addEventListener('click', () => {
  selectedVenues = new Set();
  renderVenues();
  render();
});

renderVenues();
render();
loadVotes();

</script>
